# docker-compose.yml — +blog autonomo
# Fase 2: deploy em Coolify / Hostinger
#
# Uso local (teste):
#   docker-compose up --build
#
# Em produção (Coolify):
#   - Apenas o serviço telegram-bot precisa ser deployado
#   - Os cron jobs (releases/pauta) rodam via crontab dentro do container
#   - O start.sh reconstrói os tokens OAuth de GMAIL_TOKEN_B64 e SHEETS_TOKEN_B64
#
# IMPORTANTE: Nunca commite o arquivo .env. Configure as variáveis
#             pelo painel do Coolify (Environment Variables).

version: "3.9"

services:

  # ── Bot Telegram + Cron — serviço único permanente ────────────────────────
  # Contém: bot daemon (foreground) + cron jobs internos (background)
  # start.sh: reconstrói tokens → instala crontab → sobe cron → sobe bot
  telegram-bot:
    build: .
    restart: always
    env_file: .env
    volumes:
      - blog_tmp:/app/.tmp
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  blog_tmp:
